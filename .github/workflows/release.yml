name: '🚀 publish'

on:
  push:
    branches:
      - main
    paths-ignore:
      - '.github/**'

permissions:
  contents: write
  packages: write

concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: 🚀 publish
    runs-on: ubuntu-latest

    steps:
      - name: 📚 checkout
        uses: actions/checkout@v2
        with:
          token: ${{ secrets.ELISRADEVOPS_ACCESS_TOKEN }}
          ref: main
          fetch-depth: 0

      - name: 🟢 node
        uses: actions/setup-node@v2
        with:
          node-version: 14

      - name: Set up npm authentication
        run: |
          echo "//registry.npmjs.org/:_authToken=${{ secrets.NPM_AUTH_TOKEN }}" > ~/.npmrc
          echo "registry=https://registry.npmjs.org" >> ~/.npmrc

      - run: npm install

      - run: npm run build

      - name: 'Automated Version Bump'
        uses: 'phips28/gh-action-bump-version@master'
        id: bump_version
        with:
          commit-message: 'CI: bumps version to {{version}} [skip ci]'

      - name: Check if current version exists on npm
        id: check_npm_version
        run: |
          PACKAGE_NAME=$(node -p "require('./package.json').name")
          PACKAGE_VERSION=$(node -p "require('./package.json').version")
          if npm view "${PACKAGE_NAME}@${PACKAGE_VERSION}" version >/dev/null 2>&1; then
            echo "already_published=true" >> "$GITHUB_OUTPUT"
            echo "${PACKAGE_NAME}@${PACKAGE_VERSION} already exists on npm. Skipping publish."
          else
            echo "already_published=false" >> "$GITHUB_OUTPUT"
          fi

      - name: 🚀 publish
        id: publish
        if: steps.check_npm_version.outputs.already_published != 'true'
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_AUTH_TOKEN }}

      - name: 🔄 rollback version bump on publish failure
        if: failure() && steps.publish.outcome == 'failure'
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git revert HEAD --no-edit
          git push
